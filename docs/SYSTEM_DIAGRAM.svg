<svg xmlns="http://www.w3.org/20w/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      .box { fill: #1e293b; stroke: #3b82f6; stroke-width: 2; rx: 8; }
      .text { fill: #f8fafc; font-family: monospace; font-size: 14px; text-anchor: middle; }
      .line { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 4; }
      .title { fill: #f8fafc; font-family: sans-serif; font-size: 24px; font-weight: bold; }
    </style>
  </defs>
  
  <rect width="100%" height="100%" fill="#0f172a" />
  <text x="400" y="50" class="title" text-anchor="middle">NagarNetra AI Architecture</text>
  
  <!-- IoT Layer -->
  <rect x="50" y="100" width="700" height="100" fill="#1e293b" stroke="#3b82f6" rx="8" />
  <text x="400" y="155" class="text">IoT Telemetry Provider (Mock / Kafka / MQTT)</text>

  <!-- State Layer -->
  <rect x="50" y="250" width="200" height="100" class="box" />
  <text x="150" y="305" class="text">useTelemetryStore</text>

  <rect x="300" y="250" width="200" height="100" class="box" />
  <text x="400" y="305" class="text">useAIEngineStore</text>

  <rect x="550" y="250" width="200" height="100" class="box" />
  <text x="650" y="305" class="text">useSimulationStore</text>

  <!-- UI Layer -->
  <rect x="50" y="400" width="200" height="100" class="box" />
  <text x="150" y="455" class="text">React Three Fiber (3D Twin)</text>

  <rect x="300" y="400" width="450" height="100" class="box" />
  <text x="525" y="455" class="text">Next.js 15 App Router (Dashboard UI)</text>

  <!-- Connections -->
  <line x1="400" y1="200" x2="400" y2="250" class="line" />
  <line x1="150" y1="200" x2="150" y2="250" class="line" />
  <line x1="650" y1="200" x2="650" y2="250" class="line" />
  
  <line x1="400" y1="350" x2="400" y2="400" class="line" />
  <line x1="150" y1="350" x2="150" y2="400" class="line" />
</svg>
