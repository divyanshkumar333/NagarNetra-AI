<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <style>
      .box { fill: #0f172a; stroke: #10b981; stroke-width: 2; rx: 8; }
      .text { fill: #f8fafc; font-family: monospace; font-size: 14px; text-anchor: middle; }
      .line { stroke: #94a3b8; stroke-width: 2; }
      .arrow { fill: #94a3b8; }
      .title { fill: #f8fafc; font-family: sans-serif; font-size: 24px; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#1e293b" />
  <text x="400" y="50" class="title" text-anchor="middle">Data Flow: Real-Time Intelligence Layer</text>

  <rect x="50" y="100" width="200" height="80" class="box" />
  <text x="150" y="145" class="text">City Sensors (IoT)</text>

  <rect x="550" y="100" width="200" height="80" class="box" />
  <text x="650" y="145" class="text">911 CAD Dispatch</text>

  <rect x="300" y="250" width="200" height="80" class="box" />
  <text x="400" y="295" class="text">TelemetryProvider</text>

  <rect x="300" y="400" width="200" height="80" class="box" />
  <text x="400" y="445" class="text">AI Engine Pipeline</text>

  <rect x="300" y="520" width="200" height="60" class="box" stroke="#ef4444" />
  <text x="400" y="555" class="text">Digital Twin (WebGL)</text>

  <line x1="150" y1="180" x2="300" y2="250" class="line" marker-end="url(#arrowhead)" />
  <line x1="650" y1="180" x2="500" y2="250" class="line" marker-end="url(#arrowhead)" />
  <line x1="400" y1="330" x2="400" y2="400" class="line" marker-end="url(#arrowhead)" />
  <line x1="400" y1="480" x2="400" y2="520" class="line" marker-end="url(#arrowhead)" />

</svg>
